<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" fill="none" role="img" aria-label="SaaS collaboration illustration">

<defs>
  <linearGradient id="gIndigo" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#6366f1"/>
    <stop offset="100%" stop-color="#4f46e5"/>
  </linearGradient>
  <linearGradient id="gLav" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#eef2ff"/>
    <stop offset="100%" stop-color="#f8f7ff"/>
  </linearGradient>
  <linearGradient id="gSoft" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#eef2ff"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#4f46e5" flood-opacity="0.13"/>
  </filter>
  <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312e81" flood-opacity="0.12"/>
  </filter>
  <style>
    .line{fill:#c7d2fe}.line2{fill:#e0e7ff}.dark{fill:#4f46e5}.mid{fill:#6366f1}.lav{fill:#eef2ff}
    .stroke{stroke:#4f46e5;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.softStroke{stroke:#c7d2fe;stroke-width:2;stroke-linecap:round}
    .uiText{font-family:Inter,Arial,sans-serif;font-weight:700;fill:#4f46e5}.tiny{font-family:Inter,Arial,sans-serif;font-weight:700;fill:#6366f1;font-size:22px}
  </style>
</defs>

<rect width="900" height="640" fill="#ffffff"/>

<circle cx="120" cy="110" r="78" fill="#eef2ff"/>
<circle cx="812" cy="538" r="88" fill="#f5f3ff"/>
<path d="M46 557 C156 510 270 590 395 538 C505 492 610 568 720 524 C786 498 838 506 870 494" stroke="#eef2ff" stroke-width="27" stroke-linecap="round" opacity="0.9"/>

<!-- version timeline -->
<g filter="url(#smallShadow)">
  <rect x="70" y="156" width="100" height="338" rx="28" fill="#ffffff" stroke="#e0e7ff" stroke-width="3"/>
  <path d="M120 222 L120 422" stroke="#c7d2fe" stroke-width="5" stroke-linecap="round"/>
  <circle cx="120" cy="222" r="18" fill="#eef2ff" stroke="#6366f1" stroke-width="4"/>
  <circle cx="120" cy="322" r="18" fill="#ffffff" stroke="#6366f1" stroke-width="4"/>
  <circle cx="120" cy="422" r="18" fill="#4f46e5"/>
  <text x="69" y="230" class="uiText" font-size="18">v1</text>
  <text x="69" y="330" class="uiText" font-size="18">v2</text>
  <text x="69" y="430" class="uiText" font-size="18">v3</text>
</g>

<!-- page v2 -->
<g filter="url(#shadow)">
  <rect x="222" y="92" width="285" height="440" rx="30" fill="url(#gSoft)" stroke="#e0e7ff" stroke-width="3"/>
  <rect x="260" y="145" width="165" height="22" rx="11" fill="#4f46e5"/>
  <rect x="260" y="205" width="190" height="14" rx="7" fill="#c7d2fe"/>
  <rect x="260" y="234" width="212" height="14" rx="7" fill="#e0e7ff"/>
  <g>
    <rect x="250" y="281" width="220" height="31" rx="10" fill="#fee2e2"/>
    <rect x="265" y="289" width="175" height="12" rx="6" fill="#ef4444" opacity="0.45"/>
    <path d="M267 295 L438 295" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  </g>
  <rect x="260" y="346" width="205" height="14" rx="7" fill="#c7d2fe"/>
  <rect x="260" y="377" width="158" height="14" rx="7" fill="#e0e7ff"/>
  <rect x="260" y="422" width="100" height="14" rx="7" fill="#c7d2fe"/>
</g>

<!-- page v3 -->
<g filter="url(#shadow)">
  <rect x="414" y="128" width="322" height="470" rx="32" fill="#ffffff" stroke="#dbe2ff" stroke-width="3"/>
  <rect x="458" y="183" width="190" height="24" rx="12" fill="#4f46e5"/>
  <rect x="458" y="250" width="210" height="14" rx="7" fill="#c7d2fe"/>
  <rect x="458" y="281" width="230" height="14" rx="7" fill="#e0e7ff"/>
  <g>
    <rect x="444" y="329" width="250" height="33" rx="11" fill="#dcfce7"/>
    <rect x="462" y="339" width="188" height="12" rx="6" fill="#22c55e" opacity="0.55"/>
  </g>
  <rect x="458" y="399" width="226" height="14" rx="7" fill="#c7d2fe"/>
  <g>
    <rect x="444" y="445" width="210" height="33" rx="11" fill="#fee2e2"/>
    <rect x="462" y="455" width="160" height="12" rx="6" fill="#ef4444" opacity="0.42"/>
    <path d="M462 461 L620 461" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  </g>
  <rect x="458" y="520" width="120" height="14" rx="7" fill="#e0e7ff"/>
</g>

<!-- floating diff cards -->
<g filter="url(#smallShadow)">
  <rect x="682" y="230" width="158" height="64" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="3"/>
  <circle cx="715" cy="262" r="17" fill="#22c55e" opacity="0.18"/>
  <path d="M708 262 H722 M715 255 V269" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  <rect x="744" y="251" width="62" height="9" rx="5" fill="#86efac"/>
  <rect x="744" y="272" width="42" height="9" rx="5" fill="#bbf7d0"/>
</g>
<g filter="url(#smallShadow)">
  <rect x="686" y="406" width="158" height="64" rx="22" fill="#ffffff" stroke="#fecaca" stroke-width="3"/>
  <circle cx="718" cy="438" r="17" fill="#ef4444" opacity="0.15"/>
  <path d="M710 438 H726" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
  <rect x="746" y="427" width="62" height="9" rx="5" fill="#fca5a5"/>
  <path d="M746 431 L808 431" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
