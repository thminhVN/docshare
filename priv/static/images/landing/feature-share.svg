  <path d="M552 328 C664 308 724 360 786 442" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round"/>
  <path d="M360 360 C270 332 206 370 154 444" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round"/>
  <path d="M432 442 C448 520 500 555 594 568" stroke="#c7d2fe" stroke-width="4" stroke-linecap="round"/>
</g>

